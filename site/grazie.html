<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avviso attivato — ClimaPronto</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#10222E; --bg:#F2F7F9; --glacial:#2E9DBB; --glacial-deep:#19606F;
    --ok:#1E9E6E; --ok-bg:#E2F4EC; --slate:#5E7480; --line:#DCE6EA;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  }
  .card{
    max-width:480px;text-align:center;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:44px 32px;box-shadow:0 2px 12px rgba(16,34,46,.06);
  }
  .badge{
    width:56px;height:56px;border-radius:50%;background:var(--ok-bg);color:var(--ok);
    display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;
  }
  h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:-0.02em;margin-bottom:12px}
  p{color:var(--slate);font-size:.95rem;line-height:1.6;margin-bottom:8px}
  .btn{
    display:inline-block;margin-top:20px;background:var(--ink);color:#fff;text-decoration:none;
    font-weight:600;font-size:.9rem;padding:12px 26px;border-radius:99px;
  }
  .btn:focus-visible{outline:3px solid var(--glacial-deep);outline-offset:2px}
</style>
</head>
<body>
  <div class="card">
    <div class="badge" aria-hidden="true">&#10003;</div>
    <h1>Avviso attivato</h1>
    <p>Il pagamento è andato a buon fine. Ti scriveremo alla email che hai indicato non appena il prodotto torna disponibile.</p>
    <p>Puoi chiudere questa pagina in tutta tranquillità.</p>
    <a class="btn" href="/">Torna al sito</a>
  </div>
</body>
</html>
